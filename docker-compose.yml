services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: royal
      POSTGRES_PASSWORD: passw0rd
      POSTGRES_DB: sodra-payload
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U royal -d sodra-payload']
      interval: 10s
      timeout: 5s
      retries: 5

  payload:
    build:
      context: .
      dockerfile: payload/Dockerfile
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgres://royal:passw0rd@postgres:5432/sodra-payload
      PAYLOAD_SECRET: 1fcae5e8859ae4c04be0b593
      PREVIEW_SECRET: 1fcae5e8859ae4c04be0b593
      # Used by the Payload admin panel and CORS — change to your public domain in production
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  webui:
    build:
      context: .
      dockerfile: webui/Dockerfile
    ports:
      - '4321:4321'
    environment:
      DATABASE_URL: postgres://royal:passw0rd@postgres:5432/sodra-payload
      PAYLOAD_SECRET: 1fcae5e8859ae4c04be0b593
      PREVIEW_SECRET: 1fcae5e8859ae4c04be0b593
      # webui uses Payload local API (direct DB) by default; set to false to switch to REST
      PAYLOAD_LOCAL_API: 'true'
      # Base URL of the payload service, used for REST calls and browser-side links
      PAYLOAD_PUBLIC_URL: http://payload:3000
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4321
    depends_on:
      postgres:
        condition: service_healthy
      payload:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
